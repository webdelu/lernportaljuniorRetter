<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten - Junior Rescue</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary-dark: #1e293b;
            --accent-blue: #3b82f6;
            --text-gray: #64748b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--primary-dark);
        }

        .container { 
            background: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            /* Flexbox sorgt dafür, dass alle Elemente im Container mittig ausgerichtet sind */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo { 
            max-width: 150px; 
            margin-bottom: 25px;
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #eff6ff;
            color: var(--accent-blue);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 25px;
            border: 1px solid #dbeafe;
        }

        h1 { 
            color: #000; 
            margin-bottom: 15px; 
            font-weight: bold; 
            font-size: 1.8rem; 
        }

        p { 
            color: var(--text-gray); 
            line-height: 1.6; 
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        .footer-note {
            width: 100%;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Junior Rescue Logo" class="logo">

    <div class="status-badge">
        System-Update läuft
    </div>

    <h1>Kurze Pause!</h1>
    
    <p>
        Wir führen aktuell Wartungsarbeiten durch, um Junior Rescue noch besser für dich zu machen. 
        Bitte schau in ein paar Minuten nochmal vorbei.
    </p>

    <div class="footer-note">
        Vielen Dank für deine Geduld!<br>
        &copy; 2026 Junior Rescue Learning
    </div>
</div>

</body>
</html>
